function MiniSparkline({data,width=100,height=28}){
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-4-((v-min)/range)*(height-8)}`).join(" ");
  const last=data[data.length-1],prev=data[data.length-2],col=last>=prev?C.green:C.red;
  const ly=height-4-((last-min)/range)*(height-8);
  return <svg width={width} height={height} style={{display:"block"}}><polyline points={pts} fill="none" stroke={col} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><circle cx={width} cy={ly} r="3" fill={col}/></svg>;
}

function Badge({value,size}){
  const p=value>0,z=value===0;
  return <span style={{background:z?C.g200:p?C.greenBg:C.redBg,color:z?C.g600:p?C.green:C.red,fontWeight:600,fontSize:size==="lg"?"13px":"11px",padding:size==="lg"?"3px 8px":"2px 6px",borderRadius:10,whiteSpace:"nowrap"}}>{p?"+":""}{fmt(value)}</span>;
}

function KPI({label,value,sub,color}){
  return <div style={{background:C.white,borderRadius:8,padding:"14px 18px",border:"1px solid "+C.g200,flex:"1 1 0",minWidth:130}}>
    <div style={{fontSize:10,color:C.g500,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>{label}</div>
    <div style={{fontSize:26,fontWeight:700,color:color||C.navy,lineHeight:1.1}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.g500,marginTop:3}}>{sub}</div>}
  </div>;
}

function Section({title,children,sub}){
  return <div style={{marginBottom:24}}><div style={{marginBottom:10}}><h3 style={{fontSize:15,fontWeight:700,color:C.navy,margin:0}}>{title}</h3>{sub&&<p style={{fontSize:11,color:C.g500,margin:"2px 0 0"}}>{sub}</p>}</div>{children}</div>;
}

function CTooltip({active,payload,label}){
  if(!active||!payload?.length)return null;
  return <div style={{background:C.white,border:"1px solid "+C.g300,borderRadius:6,padding:"8px 12px",fontSize:12,boxShadow:"0 2px 8px rgba(0,0,0,0.12)"}}>
    <div style={{fontWeight:700,marginBottom:4}}>{label}</div>
    {payload.map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{width:8,height:8,borderRadius:4,background:p.color,display:"inline-block"}}/><span style={{color:C.g600}}>{p.name}:</span><span style={{fontWeight:600}}>{fmt(p.value)}</span></div>)}
  </div>;
}

    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:24}}>

    </div>

            <CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="year" tick={{fontSize:12}} stroke={C.g400}/>
            <YAxis domain={[10500,11600]} tick={{fontSize:11}} stroke={C.g400} tickFormatter={v=>fmt(v)}/><Tooltip content={<CTooltip/>}/>

        </ResponsiveContainer>
      </div>

            {comunas.map((c,i)=><Line key={c} type="monotone" dataKey={c} name={c} stroke={comunaColors[i]} strokeWidth={comunaSel===c?3:1.8} dot={{r:comunaSel===c?5:3}} opacity={comunaSel&&comunaSel!==c?0.3:1}/>)}
          </LineChart>
        </ResponsiveContainer>

          {comunas.map((c,i)=><button key={c} onClick={()=>setComunaSel(comunaSel===c?null:c)} style={{padding:"4px 12px",borderRadius:16,border:"2px solid "+comunaColors[i],background:comunaSel===c?comunaColors[i]:C.white,color:comunaSel===c?C.white:comunaColors[i],fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.15s"}}>{c} <span style={{fontWeight:400,opacity:0.8}}>({fmt(comunaData[c][5])})</span></button>)}

      <div style={{background:C.white,borderRadius:8,border:"1px solid "+C.g200,padding:16}}>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={ruralChartData}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="year" tick={{fontSize:12}} stroke={C.g400}/><YAxis tick={{fontSize:11}} stroke={C.g400} tickFormatter={v=>fmt(v)}/><Tooltip content={<CTooltip/>}/>
            <Bar dataKey="Rural" name="Rural" fill={C.orange} radius={[3,3,0,0]}/><Bar dataKey="Urbano" name="Urbano" fill={C.navyLight} radius={[3,3,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
        <div style={{display:"flex",gap:16,marginTop:8,fontSize:12}}>
          <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:C.orange,marginRight:4}}/>Rural: {fmt(3057)} <Badge value={3057-3457}/></span>
          <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:C.navyLight,marginRight:4}}/>Urbano: {fmt(7828)} <Badge value={7828-7573}/></span>
        </div>
      </div>
    </Section>

    <Section title="Matrícula por grado — Educación Básica" sub="Efecto cohorte visible: 1° Básico 2026 es el mínimo histórico (631)">
      <div style={{background:C.white,borderRadius:8,border:"1px solid "+C.g200,padding:16}}>
        <ResponsiveContainer width="100%" height={240}>
          <LineChart data={gradoData}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="year" tick={{fontSize:12}} stroke={C.g400}/><YAxis tick={{fontSize:11}} stroke={C.g400}/><Tooltip content={<CTooltip/>}/>
            {Object.keys(gradoBasica).map((g,i)=><Line key={g} type="monotone" dataKey={g} name={g} stroke={`hsl(${i*40+200},55%,${40+i*3}%)`} strokeWidth={g==="1° Básico"?3:1.5} dot={{r:g==="1° Básico"?4:2}}/>)}
          </LineChart>
        </ResponsiveContainer>
      </div>
    </Section>

    <Section title="Matrícula por grado — Enseñanza Media HC">
      <div style={{background:C.white,borderRadius:8,border:"1px solid "+C.g200,padding:16}}>
        <ResponsiveContainer width="100%" height={200}>
          <LineChart data={mediaData}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="year" tick={{fontSize:12}} stroke={C.g400}/><YAxis tick={{fontSize:11}} stroke={C.g400}/><Tooltip content={<CTooltip/>}/>
            {Object.keys(gradoMedia).map((g,i)=><Line key={g} type="monotone" dataKey={g} name={g} stroke={`hsl(${i*60+120},60%,40%)`} strokeWidth={2} dot={{r:3}}/>)}
          </LineChart>
        </ResponsiveContainer>
      </div>
    </Section>
  </div>;
}

function EstablecimientoView(){
  const [search,setSearch]=useState("");
  const [filterCom,setFilterCom]=useState("Todas");
  const [filterZona,setFilterZona]=useState("Todas");
  const [sortKey,setSortKey]=useState("var2126");
  const [sortDir,setSortDir]=useState("asc");
  const [selected,setSelected]=useState(null);

  const enriched=useMemo(()=>establecimientos.map(e=>{const m=e.mat;return{...e,v2126:m[5]-m[0],v2526:m[5]-m[4],peak:Math.max(...m),peakYr:YEARS[m.indexOf(Math.max(...m))],active:m[5]>0}}),[]);

  const filtered=useMemo(()=>{
    let r=enriched;
    if(filterCom!=="Todas")r=r.filter(e=>e.com===filterCom);
    if(filterZona!=="Todas")r=r.filter(e=>e.zona.startsWith(filterZona));
    if(search){const s=search.toLowerCase();r=r.filter(e=>e.nom.toLowerCase().includes(s)||String(e.rbd).includes(s))}
    r=[...r].sort((a,b)=>{if(sortKey==="nom")return sortDir==="asc"?a.nom.localeCompare(b.nom):b.nom.localeCompare(a.nom);const va=a[sortKey==="var2126"?"v2126":sortKey==="var2526"?"v2526":"mat"][sortKey==="mat26"?5:0];const vb=b[sortKey==="var2126"?"v2126":sortKey==="var2526"?"v2526":"mat"][sortKey==="mat26"?5:0];return sortDir==="asc"?va-vb:vb-va});
    if(sortKey==="mat26")r=[...r].sort((a,b)=>sortDir==="asc"?a.mat[5]-b.mat[5]:b.mat[5]-a.mat[5]);
    if(sortKey==="var2126")r=[...r].sort((a,b)=>sortDir==="asc"?a.v2126-b.v2126:b.v2126-a.v2126);
    if(sortKey==="var2526")r=[...r].sort((a,b)=>sortDir==="asc"?a.v2526-b.v2526:b.v2526-a.v2526);
    return r;
  },[enriched,filterCom,filterZona,search,sortKey,sortDir]);

  const toggleSort=k=>{if(sortKey===k)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(k);setSortDir("asc")}};
  const sI=k=>sortKey===k?(sortDir==="asc"?" ↑":" ↓"):"";
  const activos=filtered.filter(e=>e.active);

  const thS={padding:"8px 6px",color:"#fff",fontWeight:600,fontSize:11,textAlign:"left",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",borderBottom:"2px solid "+C.navy};
  const tdS={padding:"6px",borderBottom:"1px solid "+C.g200,verticalAlign:"middle"};

  return <div>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
      <KPI label="Activos 2026" value={enriched.filter(e=>e.active).length} sub={"de "+enriched.length+" totales"}/>
      <KPI label="Con baja 21→26" value={activos.filter(e=>e.v2126<0).length} color={C.red}/>
      <KPI label="Con alza 21→26" value={activos.filter(e=>e.v2126>0).length} color={C.green}/>
      <KPI label="Cerrados" value={enriched.filter(e=>!e.active&&e.mat[0]>0).length} sub="Matrícula 0 en 2026" color={C.orange}/>
    </div>

    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre o RBD..." style={{padding:"8px 12px",borderRadius:6,border:"1px solid "+C.g300,fontSize:13,width:220,outline:"none"}}/>
      <select value={filterCom} onChange={e=>setFilterCom(e.target.value)} style={{padding:"8px 10px",borderRadius:6,border:"1px solid "+C.g300,fontSize:13,background:C.white}}>
        {["Todas","Fresia","Frutillar","Llanquihue","Los Muermos","Puerto Varas"].map(c=><option key={c} value={c}>{c==="Todas"?"Todas las comunas":c}</option>)}
      </select>
      <select value={filterZona} onChange={e=>setFilterZona(e.target.value)} style={{padding:"8px 10px",borderRadius:6,border:"1px solid "+C.g300,fontSize:13,background:C.white}}>
        <option value="Todas">Todas las zonas</option><option value="U">Urbano</option><option value="R">Rural</option>
      </select>
      <span style={{fontSize:12,color:C.g500}}>{filtered.length} establecimientos</span>
    </div>

    <div style={{overflowX:"auto",borderRadius:8,border:"1px solid "+C.g200}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,background:C.white}}>
        <thead><tr style={{background:C.navy}}>
          <th style={thS} onClick={()=>toggleSort("nom")}>Establecimiento{sI("nom")}</th>
          <th style={{...thS,width:80}}>Comuna</th>
          <th style={{...thS,width:35}}>Zona</th>
          <th style={{...thS,width:55}} onClick={()=>toggleSort("mat26")}>2026{sI("mat26")}</th>
          <th style={{...thS,width:80}}>Tendencia</th>
          <th style={{...thS,width:70}} onClick={()=>toggleSort("var2126")}>Var 21→26{sI("var2126")}</th>
          <th style={{...thS,width:70}} onClick={()=>toggleSort("var2526")}>Var 25→26{sI("var2526")}</th>
          <th style={{...thS,width:50}}>Peak</th>
        </tr></thead>
        <tbody>{filtered.map((e,i)=>{
          const isSel=selected===e.rbd;
          const rowBg=isSel?"#E3F2FD":i%2===0?C.white:C.g50;
          return [
            <tr key={e.rbd} style={{background:rowBg,cursor:"pointer",transition:"background 0.1s"}} onClick={()=>setSelected(isSel?null:e.rbd)}>
              <td style={tdS}><div style={{fontWeight:600,color:C.g800}}>{e.nom}</div><div style={{fontSize:10,color:C.g500}}>RBD {e.rbd}</div></td>
              <td style={{...tdS,textAlign:"center",fontSize:11}}>{e.com}</td>
              <td style={{...tdS,textAlign:"center"}}><span style={{background:e.zona.startsWith("R")?C.orangeBg:C.g100,color:e.zona.startsWith("R")?C.orange:C.g700,padding:"1px 6px",borderRadius:8,fontSize:10,fontWeight:600}}>{e.zona}</span></td>
              <td style={{...tdS,textAlign:"center",fontWeight:700}}>{e.mat[5]===0?<span style={{color:C.g400}}>—</span>:fmt(e.mat[5])}</td>
              <td style={{...tdS,textAlign:"center"}}><MiniSparkline data={e.mat}/></td>
              <td style={{...tdS,textAlign:"center"}}><Badge value={e.v2126}/></td>
              <td style={{...tdS,textAlign:"center"}}><Badge value={e.v2526}/></td>
              <td style={{...tdS,textAlign:"center",fontSize:10,color:C.g500}}>{fmt(e.peak)}<br/>({e.peakYr})</td>
            </tr>,
            isSel&&<tr key={e.rbd+"d"} style={{background:"#E3F2FD"}}><td colSpan={8} style={{padding:12}}>
              <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                {YEARS.map((y,yi)=><div key={y} style={{textAlign:"center"}}><div style={{fontSize:10,color:C.g500}}>{y}</div><div style={{fontSize:16,fontWeight:700,color:e.mat[yi]===0?C.g400:C.g800}}>{fmt(e.mat[yi])}</div>{yi>0&&<div style={{fontSize:10,color:varColor(e.mat[yi]-e.mat[yi-1])}}>{varSign(e.mat[yi]-e.mat[yi-1])}</div>}</div>)}
                <div style={{flex:1,minWidth:160}}>
                  <ResponsiveContainer width="100%" height={70}>
                    <BarChart data={YEARS.map((y,yi)=>({year:y,mat:e.mat[yi]}))}><XAxis dataKey="year" tick={{fontSize:10}} stroke={C.g300}/><Tooltip content={<CTooltip/>}/>
                      <Bar dataKey="mat" name="Matrícula" radius={[3,3,0,0]}>{YEARS.map((y,yi)=><Cell key={y} fill={yi===5?(e.mat[5]>=e.mat[4]?C.green:C.red):C.navyLight}/>)}</Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </td></tr>
          ];
        })}</tbody>
      </table>
    </div>
    <div style={{marginTop:8,fontSize:11,color:C.g500}}>Haz clic en una fila para ver el detalle. Haz clic en los encabezados para ordenar. (*) Colegio Nueva Braunau reclasificado de R a U en 2023.</div>
  </div>;
}

function App(){
  const [view,setView]=useState("territorial");
  return <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",background:C.g100,minHeight:"100vh",color:C.g800}}>
    <div style={{background:C.navy,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
      <div><div style={{color:C.white,fontSize:17,fontWeight:700,letterSpacing:"-0.02em"}}>Dashboard Matrícula SLEP Llanquihue</div><div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>Serie 2021–2026 · Base CEM-MINEDUC · Corte abril/mayo</div></div>
      <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.12)",borderRadius:8,padding:3}}>
        {[["territorial","Territorial"],["establecimientos","Por Establecimiento"]].map(([k,l])=><button key={k} onClick={()=>setView(k)} style={{padding:"6px 16px",borderRadius:6,border:"none",background:view===k?"rgba(255,255,255,0.95)":"transparent",color:view===k?C.navy:"rgba(255,255,255,0.8)",fontWeight:view===k?700:500,fontSize:12,cursor:"pointer",transition:"all 0.15s"}}>{l}</button>)}
      </div>
    </div>
    <div style={{maxWidth:1000,margin:"0 auto",padding:"20px 16px"}}>{view==="territorial"?<TerritorialView/>:<EstablecimientoView/>}</div>
    <div style={{textAlign:"center",padding:"16px 20px",fontSize:10,color:C.g400,borderTop:"1px solid "+C.g200}}>SLEP Llanquihue · Subdirección de Planificación y Control de Gestión · Datos oficiales CEM-MINEDUC · Junio 2026</div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
